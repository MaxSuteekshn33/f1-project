<!DOCTYPE html>
<html>
<head><title>Favicon Preview</title>
<style>body{background:#333;display:flex;gap:20px;align-items:center;padding:40px;font-family:sans-serif;color:white;}
.box{text-align:center;}
img{display:block;image-rendering:pixelated;}
</style>
</head>
<body>
  <div class="box"><img src="favicon.svg" width="64" height="64"><p>64px</p></div>
  <div class="box"><img src="favicon.svg" width="32" height="32"><p>32px</p></div>
  <div class="box"><img src="favicon.svg" width="16" height="16"><p>16px (tab size)</p></div>
  <div class="box" style="background:#fff;padding:10px;border-radius:8px"><img src="favicon.svg" width="32" height="32"><p style="color:#333">on white</p></div>
</body>
</html>
