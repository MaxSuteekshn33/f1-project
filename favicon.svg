<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0a0a0a"/>

  <!-- F1 suit body (collar) -->
  <ellipse cx="32" cy="58" rx="16" ry="10" fill="#e8303a"/>
  <rect x="16" y="52" width="32" height="10" rx="3" fill="#e8303a"/>

  <!-- Neck -->
  <rect x="26" y="44" width="12" height="10" rx="4" fill="#8a7a6a"/>

  <!-- Hippo head -->
  <ellipse cx="32" cy="36" rx="18" ry="16" fill="#9a8a7a"/>

  <!-- Helmet - main dome -->
  <ellipse cx="32" cy="26" rx="19" ry="15" fill="#e8303a"/>
  <!-- Helmet top -->
  <ellipse cx="32" cy="16" rx="15" ry="10" fill="#e8303a"/>

  <!-- Helmet visor -->
  <path d="M14 28 Q32 34 50 28 L50 24 Q32 30 14 24 Z" fill="#1a1a2e"/>
  <path d="M14 28 Q32 34 50 28 L50 24 Q32 30 14 24 Z" fill="rgba(100,160,255,0.15)"/>

  <!-- Helmet chin strap area -->
  <path d="M14 26 Q13 34 18 40 Q32 44 46 40 Q51 34 50 26" fill="none" stroke="#c0202a" stroke-width="2"/>

  <!-- Hippo snout (big and round - lower face) -->
  <ellipse cx="32" cy="43" rx="12" ry="8" fill="#b09080"/>
  <!-- Nostrils -->
  <ellipse cx="28" cy="42" rx="3" ry="2" fill="#7a6050"/>
  <ellipse cx="36" cy="42" rx="3" ry="2" fill="#7a6050"/>

  <!-- Eyes -->
  <ellipse cx="24" cy="32" rx="4" ry="4" fill="white"/>
  <ellipse cx="40" cy="32" rx="4" ry="4" fill="white"/>
  <circle cx="25" cy="32" r="2.5" fill="#1a1a1a"/>
  <circle cx="41" cy="32" r="2.5" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="26" cy="31" r="1" fill="white"/>
  <circle cx="42" cy="31" r="1" fill="white"/>

  <!-- Helmet stripe -->
  <path d="M32 8 L32 22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Helmet side detail -->
  <rect x="13" y="24" width="4" height="6" rx="2" fill="#c0202a"/>
  <rect x="47" y="24" width="4" height="6" rx="2" fill="#c0202a"/>
</svg>
